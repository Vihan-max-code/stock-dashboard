name: Update stock prices
 
# Runs at 21:35 UTC on weekdays — that's 5:35pm ET during daylight saving
# (EDT, roughly Mar–Nov) and 4:35pm ET during standard time (EST, roughly
# Nov–Mar). US markets close at 4:00pm ET regardless of DST, so this
# padding guarantees the fetch always happens after the close, in both
# halves of the year. The previous time (20:20 UTC) was fine in EDT but
# landed at 3:20pm ET — before close — during EST months.
on:
  schedule:
    - cron: "35 21 * * 1-5"
  workflow_dispatch: {}
 
permissions:
  contents: write
 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
 
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Fetch latest quotes
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: node scripts/update-prices.mjs
 
      - name: Commit updated prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --cached --quiet || git commit -m "Update live stock prices"
          git push
 
